name: multi-agent-simulate
description: Simulate a multi-agent transfer with inline flags
implementations: [typescript, python, python-v2, go, go-v2, rust]
argv:
  - simulate
  - multi-agent
  - --network
  - testnet
  - --function
  - "0x1::aptos_account::transfer"
  - --sender-address
  - "0x111"
  - --secondary-signer-address
  - "0x222"
  - --arg
  - "address:0x333"
  - --arg
  - "u64:1000"
